<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1366, height=1024, initial-scale=1.0, user-scalable=no, maximum-scale=1.0" />
  <title>CH.03 — Typography Timeline · Type Lab</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="min-h-screen bg-background flex flex-col">

  <div class="ch3-header">
    <header class="chapter-header">
      <div class="chapter-header-inner">
        <a href="chapterpage.html" class="chapter-header-back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 5 5 12 12 19"/></svg>
          Menü
        </a>
        <div class="chapter-header-divider"></div>
        <div class="chapter-header-meta">
          <span class="chapter-num font-mono">CH.03</span>
          <span class="chapter-title-label font-display">Typografie-Zeitstrahl · 1970 → 2016</span>
        </div>
        <div class="chapter-header-right">
          <div class="progress-dots" id="progress-dots"></div>
          <span class="font-mono text-muted" style="font-size:.75rem">3/6</span>
          <button class="btn-complete" id="btn-complete" type="button">Abschließen &amp; weiter</button>
        </div>
      </div>
      <p class="chapter-eyebrow text-muted">
        Scrolle durch die linke Spalte, um Jahrzehnte der Typografiegeschichte zu erkunden. Die rechte Spalte bewegt sich schneller – ein Parallaxeffekt, der die Entwicklung spürbar macht.
      </p>
    </header>
  </div>

  <main class="chapter-main animate-in" style="flex:1;overflow:hidden">
    <div class="ch3-scroll-area" id="ch3-scroll">
      <div class="ch3-layout">
        <!-- Timeline entries -->
        <div class="ch3-main">
          <div class="ch3-timeline-line"></div>
          <div id="ch3-entries"></div>
        </div>
        <!-- Swatch sidebar -->
        <div class="ch3-sidebar">
          <div class="ch3-sidebar-inner" id="ch3-sidebar-inner">
            <div class="ch3-cards-stack" id="ch3-swatches"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="progress.js"></script>
  <script src="chapter3.js"></script>
