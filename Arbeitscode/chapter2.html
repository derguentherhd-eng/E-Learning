<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1366, height=1024, initial-scale=1.0, user-scalable=no, maximum-scale=1.0" />
  <title>CH.02 — Karteikarten-Karussell · Type Lab</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="min-h-screen bg-background flex flex-col">

  <div class="ch2-header">
    <header class="chapter-header">
      <div class="chapter-header-inner">
        <a href="chapterpage.html" class="chapter-header-back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 5 5 12 12 19"/></svg>
          Menü

        <div class="chapter-header-divider"></div>
        <div class="chapter-header-meta">
          <span class="chapter-num font-mono">CH.02</span>
          <span class="chapter-title-label font-display">Schriftlehre-Karteikarten</span>
        </div>
        <div class="chapter-header-right">
          <div class="progress-dots" id="progress-dots"></div>
          <span class="font-mono text-muted" style="font-size:.75rem">2/6</span>
          <button class="btn-complete" id="btn-complete" type="button">Abschließen &amp; weiter</button>
        </div>
      </div>
      <p class="chapter-eyebrow text-muted">
        Wische durch das Kartendeck. Tippe auf eine Karte, um sie umzudrehen und die Antwort zu sehen.
      </p>
    </header>
  </div>

  <main class="chapter-main animate-in">

      <div class="ch2-carousel" id="ch2-carousel"></div>
      <div class="ch2-controls">
        <button class="ch2-btn-nav" id="ch2-prev" type="button" aria-label="Vorherige Karte">

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
        <button class="ch2-btn-flip font-display" id="ch2-flip" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/></svg>
          Karte wenden
        </button>
      </div>
    </div>

  <script src="progress.js"></script>
  <script src="chapter2.js"></script>
